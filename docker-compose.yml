services:
  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL_STREAM: ${GROQ_MODEL_STREAM:-llama-3.3-70b-versatile}
      GROQ_MODEL_STRUCTURED: ${GROQ_MODEL_STRUCTURED:-openai/gpt-oss-20b}
      COPILOT_STREAMING_ENABLED: ${COPILOT_STREAMING_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-LendSignal 360}
    ports:
      - "3000:3000"
    depends_on:
      - api
